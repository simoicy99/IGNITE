[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm exec prisma generate && cd services/api && echo 'build done'"

[deploy]
startCommand = "cd services/api && node_modules/.bin/tsx src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
