[build]
builder = "nixpacks"
buildCommand = "pnpm install && cd services/api && pnpm exec prisma generate"

[deploy]
startCommand = "cd services/api && node_modules/.bin/tsx src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
